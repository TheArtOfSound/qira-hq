<html><head><meta charset="UTF-8"><title>Qira HQ</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080810;color:#d0d0d0;font-family:'SF Mono','Courier New',monospace;padding:20px;max-width:1200px;margin:0 auto;}
h1{color:#00ff88;font-size:2.8em;letter-spacing:8px;text-shadow:0 0 40px rgba(0,255,136,0.3);text-align:center;margin-bottom:4px;}
.subtitle{text-align:center;color:#444;font-size:0.85em;margin-bottom:25px;}

/* Hero */
.hero{background:linear-gradient(135deg,#0a200a,#0a0a20);border:2px solid #00ff88;border-radius:12px;padding:30px;text-align:center;margin-bottom:25px;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;bottom:0;background:radial-gradient(circle at 30% 50%,rgba(0,255,136,0.05),transparent 60%);pointer-events:none;}
.hero .num{font-size:3em;font-weight:bold;color:#00ff88;text-shadow:0 0 30px rgba(0,255,136,0.5);}
.hero .row{display:flex;justify-content:center;gap:50px;margin-top:20px;flex-wrap:wrap;}
.hero .item{text-align:center;}
.hero .item .val{font-size:1.6em;font-weight:bold;}
.hero .item .lbl{color:#555;font-size:0.7em;letter-spacing:2px;margin-top:2px;}
.hero .src{color:#333;font-size:0.7em;margin-top:15px;font-style:italic;}

/* Section */
.sec{border-radius:10px;padding:18px;margin-bottom:15px;border:1.5px solid #222;background:#0c0c14;}
.sec h2{font-size:1em;margin-bottom:12px;letter-spacing:1px;display:flex;align-items:center;gap:8px;}
.sec h2 .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
.proven .dot{background:#00ff88;} .proven h2{color:#00ff88;} .proven{border-color:#00ff88;}
.h200 .dot{background:#ff8800;} .h200 h2{color:#ff8800;} .h200{border-color:#ff8800;}
.eval .dot{background:#aa00ff;} .eval h2{color:#aa00ff;} .eval{border-color:#aa00ff;}
.abl .dot{background:#ff4488;} .abl h2{color:#ff4488;} .abl{border-color:#ff4488;}
.status .dot{background:#00aaff;} .status h2{color:#00aaff;} .status{border-color:#00aaff;}
.chat .dot{background:#ff00ff;} .chat h2{color:#ff00ff;} .chat{border-color:#ff00ff;}
.warn{border-color:#ffaa00;} .warn h2{color:#ffaa00;}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:0.85em;}
th{color:#00aaff;padding:6px 8px;border-bottom:1px solid #333;text-align:left;font-size:0.8em;letter-spacing:1px;}
td{padding:6px 8px;border-bottom:1px solid #151520;}
.w{color:#00ff88;font-weight:bold;} .l{color:#ff4444;} .n{color:#666;}
.src-line{color:#444;font-size:0.7em;margin-top:8px;font-style:italic;}
.caveat{background:#1a1a0a;border:1px solid #554400;border-radius:5px;padding:8px;margin-top:8px;color:#aa8800;font-size:0.8em;}

/* Grid */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:15px 0;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:15px 0;}
@media(max-width:800px){.g2,.g3{grid-template-columns:1fr;}}

/* Cards */
.card{background:#0e0e18;border:1px solid #222;border-radius:8px;padding:10px;transition:border-color 0.2s;}
.card:hover{border-color:#00ff88;}
.card.live{border-color:#553333;} .card.done{border-color:#00ff88;}
.card .nm{color:#eee;font-weight:bold;font-size:0.9em;margin-bottom:6px;}
.tag{font-size:0.55em;padding:2px 5px;border-radius:3px;margin-left:5px;vertical-align:middle;}
.tag.fw{background:#1a3a1a;color:#00ff88;} .tag.c4{background:#3a3a1a;color:#ffaa00;}
.tag.pile{background:#1a1a3a;color:#88aaff;} .tag.ab{background:#2a1a2a;color:#ff88ff;}
.tag.lv{background:#3a1a1a;color:#ff8888;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.card .row{display:flex;gap:12px;flex-wrap:wrap;}
.card .m .k{color:#555;font-size:0.6em;text-transform:uppercase;letter-spacing:1px;}
.card .m .v{font-size:1.2em;font-weight:bold;}

/* Chat */
#chat-history{max-height:250px;overflow-y:auto;padding:10px;background:#050510;border-radius:5px;border:1px solid #222;margin-bottom:8px;min-height:40px;}
#chat-input{flex:1;background:#0a0a1a;color:#e0e0e0;border:1px solid #333;border-radius:5px;padding:10px;font-family:monospace;font-size:0.85em;}
.sbtn{background:#ff00ff;color:#000;border:none;border-radius:5px;padding:10px 18px;font-family:monospace;font-weight:bold;cursor:pointer;}
.sbtn:hover{background:#ff44ff;}

#updated{color:#333;text-align:center;margin-top:20px;font-size:0.75em;}
</style></head><body>

<h1>QIRA HQ</h1>
<div class="subtitle">LOLM Research Command Center - Qira LLC - Patent #64/002,166</div>

<div id="content">Loading data...</div>
<div id="updated"></div>

<script>
function ppl(l){return l>20?Infinity:Math.exp(l);}
function fmt(n){return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?n.toLocaleString():n.toFixed(0);}
function avgAt(e,s){let l=e.filter(x=>x.step>=s-100&&x.step<=s+100).map(x=>x.loss_tok);return l.length?l.reduce((a,b)=>a+b)/l.length:null;}

Promise.all([
  fetch('data.json?t='+Date.now()).then(r=>r.json()),
  fetch('logs.json?t='+Date.now()).then(r=>r.json()).catch(()=>({})),
  fetch('research_data.json?t='+Date.now()).then(r=>r.json()).catch(()=>({}))
]).then(([data,logs,research])=>{
let html='';

// ═══════════════ HERO ═══════════════
let fl20=logs.full_lolm?avgAt(logs.full_lolm,20000):null;
let mb20=logs.matched_baseline?avgAt(logs.matched_baseline,20000):null;
let d20=(fl20&&mb20)?((Math.exp(mb20)-Math.exp(fl20))/Math.exp(mb20)*100).toFixed(1):'?';

html+=`<div class="hero">
<div class="num">LOLM WINS</div>
<div class="row">
  <div class="item"><div class="val" style="color:#00ff88;">+${d20}%</div><div class="lbl">TPU 300M (20K, VERIFIED)</div></div>
  <div class="item"><div class="val" style="color:#00ff88;">+15%</div><div class="lbl">H200 1.57B (PROVEN)</div></div>
  <div class="item"><div class="val" style="color:#ff4444;">14Mx</div><div class="lbl">GATE ABLATION (FROM FILE)</div></div>
  <div class="item"><div class="val" style="color:#00aaff;">#64002166</div><div class="lbl">PATENT FILED</div></div>
  <div class="item"><div class="val" style="color:#ffaa00;animation:pulse 2s infinite;">1.4B</div><div class="lbl">TRAINING NOW (TPU v4-8)</div></div>
</div>
<div class="src">All TPU numbers computed from raw .jsonl log files. H200 gate ablation from results/ablation_gate_step20000.txt.</div>
</div>`;

// ═══════════════ 1.4B SCALE RUN BANNER ═══════════════
let s14=data['lolm_1_4b'];
if(s14){
  let st14=s14._status||'TRAINING';
  let stColor=st14==='COMPILING'?'#ffaa00':st14==='TRAINING'?'#00ff88':'#666';
  html+=`<div class="sec" style="border:2px solid #ffaa00;background:linear-gradient(135deg,#1a1500,#0a0a20);margin-bottom:20px;">
  <h2 style="color:#ffaa00;font-size:1.3em;"><span class="dot" style="background:#ffaa00;animation:pulse 2s infinite;"></span> SCALE RUN: 1.4B FULL LOLM — LARGEST YET</h2>
  <div style="display:flex;gap:30px;flex-wrap:wrap;margin-top:10px;">
    <div class="m"><div class="k">PARAMS</div><div class="v" style="color:#ffaa00;font-size:1.4em;">${s14._params||'1.39B'}</div></div>
    <div class="m"><div class="k">CONFIG</div><div class="v" style="color:#888;">${s14._config||'d=2048 n=28 h=16'}</div></div>
    <div class="m"><div class="k">HARDWARE</div><div class="v" style="color:#00aaff;">${s14._hardware||'TPU v4-8'}</div></div>
    <div class="m"><div class="k">STATUS</div><div class="v" style="color:${stColor};animation:${st14==='COMPILING'||st14==='TRAINING'?'pulse 2s infinite':'none'};">${st14}</div></div>
    <div class="m"><div class="k">STEP</div><div class="v" style="color:#00ff88;">${(s14.step||0).toLocaleString()}</div></div>
    ${s14.loss_tok>0?'<div class="m"><div class="k">LOSS</div><div class="v" style="color:#ff8800;">'+s14.loss_tok.toFixed(3)+'</div></div>':''}
    ${s14.gate_mean>0?'<div class="m"><div class="k">GATE</div><div class="v" style="color:#00aaff;">'+s14.gate_mean.toFixed(3)+'</div></div>':''}
  </div>
  <div class="src-line" style="margin-top:10px;">Full 5-stream architecture: Surface Decoder + Latent SSM + Memory + Regime + Gate | 28 layers, d=2048 | FineWeb-Edu</div>
  </div>`;
}

// ═══════════════ TWO KEY COMPARISONS ═══════════════
function compTable(lKey,bKey,title,srcL,srcB){
  let ll=logs[lKey]||[],bl=logs[bKey]||[];
  if(!ll.length||!bl.length)return'';
  let max=Math.min(ll[ll.length-1].step,bl[bl.length-1].step);
  let checks=[1000,2000,3000,5000,7500,10000,15000,20000,30000,50000].filter(s=>s<=max);
  if(!checks.length)return'';
  let h='<table><tr><th>Step</th><th>LOLM Loss</th><th>LOLM PPL</th><th>Base Loss</th><th>Base PPL</th><th>PPL Delta</th></tr>';
  checks.forEach(s=>{
    let la=avgAt(ll,s),ba=avgAt(bl,s);
    if(!la||!ba)return;
    let lp=Math.exp(la),bp=Math.exp(ba),d=((bp-lp)/bp*100).toFixed(1);
    h+=`<tr><td>${s.toLocaleString()}</td><td class="${la<ba?'w':'l'}">${la.toFixed(3)}</td><td>${fmt(lp)}</td><td class="${ba<la?'w':'l'}">${ba.toFixed(3)}</td><td>${fmt(bp)}</td><td class="${d>0?'w':'l'}">${d>0?'+':''}${d}%</td></tr>`;
  });
  h+=`</table><div class="src-line">Source: ${srcL} + ${srcB}</div>`;
  return h;
}

html+='<div class="g2">';

// FineWeb controlled
html+='<div class="sec proven"><h2><span class="dot"></span>CONTROLLED: LOLM vs Baseline (identical f32 b2)</h2>';
html+=compTable('full_lolm','matched_baseline','','clean/full_lolm_run1.jsonl (20,981)','clean/matched_baseline_run1.jsonl (36,240)');
html+='</div>';

// ParamMatch
html+='<div class="sec proven"><h2><span class="dot"></span>PARAM-MATCHED: LOLM 319M vs Baseline 317M</h2>';
html+=compTable('full_lolm','param_matched','','clean/full_lolm_run1.jsonl','param_matched/log.jsonl (37,354)');
html+='<div class="caveat">Equal params. LOLM wins 3K-15K. Converges at 20K. Destroys "more params" criticism.</div>';
html+='</div>';

html+='</div>'; // g2

// ═══════════════ EVIDENCE GRID ═══════════════
html+='<div class="g3">';

// H200
if(research&&research.h200_results){
  let r=research.h200_results,ga=r.gate_ablation;
  html+='<div class="sec h200"><h2><span class="dot"></span>H200 (CUDA)</h2>';
  html+='<table>';
  html+=`<tr><td>1.57B PPL</td><td class="w">${r.lolm_1_57b.ppl}</td><td class="l">${r.baseline_1_57b.ppl}</td><td class="w">+15%</td></tr>`;
  html+=`<tr><td>304M vs Pythia</td><td class="w">${r.lolm_304m.ppl}</td><td class="l">${r.pythia_410m.ppl}</td><td class="w">+52%</td></tr>`;
  html+=`<tr><td>Gate Ablation</td><td class="w">PPL 34</td><td class="l">PPL 485M</td><td style="color:#ff4444;">14Mx</td></tr>`;
  html+='</table><div class="src-line">ablation_gate_step20000.txt (verified)</div></div>';
}

// Downstream Evals
if(research&&research.downstream_evals){
  let de=research.downstream_evals;
  html+='<div class="sec eval"><h2><span class="dot"></span>Downstream Evals (20K)</h2>';
  html+='<table>';
  html+=`<tr><td>WikiText PPL</td><td class="w">${de.full_lolm_20k.wikitext_ppl.toFixed(0)}</td><td class="l">${de.baseline_20k.wikitext_ppl.toFixed(0)}</td><td class="w">6.5%</td></tr>`;
  html+=`<tr><td>HellaSwag</td><td class="w">${(de.full_lolm_20k.hellaswag*100).toFixed(0)}%</td><td class="l">${(de.baseline_20k.hellaswag*100).toFixed(0)}%</td><td class="w">+18%</td></tr>`;
  html+=`<tr><td>LAMBADA</td><td>${(de.full_lolm_20k.lambada*100)}%</td><td>${(de.baseline_20k.lambada*100)}%</td><td class="n">tied</td></tr>`;
  html+='</table><div class="src-line">eval_full_20k.json</div></div>';
}

// Ablations
html+='<div class="sec abl"><h2><span class="dot"></span>Ablations (TPU)</h2>';
html+='<table>';
[['no_ssm','No SSM'],['no_regime','No Regime'],['no_gate','No Gate (g=0.5)'],['param_matched','ParamMatch 317M']].forEach(([k,n])=>{
  let d=data[k];if(!d)return;
  let p=d.loss_tok?ppl(d.loss_tok):null;
  let st=d.step>=50000?'<span class="w">DONE</span>':`<span style="color:#aa8800;">${d.step.toLocaleString()}</span>`;
  html+=`<tr><td>${n}</td><td>${p&&p<1e6?fmt(p):'-'}</td><td>${st}</td></tr>`;
});
html+='</table></div>';

html+='</div>'; // g3

// ═══════════════ ACTIVE TRAINING ═══════════════
let liveRuns=[
  ['lolm_1_4b','1.4B FULL LOLM (v4-8)','fw','lv'],
  ['full_lolm_live','FULL LOLM 300M','fw','lv'],['matched_baseline_live','Match Base','fw','lv'],
  ['param_matched','ParamMatch 317M','fw','lv'],['no_regime','No Regime','ab','lv'],
  ['no_gate','No Gate','ab','lv'],['full_c4','FULL LOLM C4','c4','lv'],
];
let doneRuns=[
  ['full_lolm','FULL LOLM (1st run)','fw'],['matched_baseline','Match Base (1st run)','fw'],
  ['full_pile','FULL LOLM Pile','pile'],['no_ssm','No-SSM','fw'],
  ['base_c4_f32','Base C4','c4'],['baseline','Baseline bf16','fw'],
  ['lolm','LOLM detached #1','fw'],['lolm2','LOLM detached #2','fw'],
];

html+='<div class="sec" style="border-color:#ff8888;"><h2 style="color:#ff8888;"><span class="dot" style="background:#ff8888;animation:pulse 2s infinite;"></span>ACTIVE TRAINING</h2>';
html+='<div class="g3">';
liveRuns.forEach(([k,nm,tg,lt])=>{
  let d=data[k];if(!d)return;
  let p=d.loss_tok?ppl(d.loss_tok):null;
  html+=`<div class="card live"><div class="nm">${nm} <span class="tag ${tg}">${lt=='lv'?'LIVE':tg}</span></div><div class="row">`;
  html+=`<div class="m"><div class="k">Step</div><div class="v">${(d.step||0).toLocaleString()}</div></div>`;
  if(p&&p<1e6)html+=`<div class="m"><div class="k">PPL</div><div class="v" style="color:#ffaa00;">${fmt(p)}</div></div>`;
  if(d.gate_mean)html+=`<div class="m"><div class="k">Gate</div><div class="v" style="color:#00aaff;">${d.gate_mean.toFixed(3)}</div></div>`;
  if(d.regime_unique)html+=`<div class="m"><div class="k">Reg</div><div class="v" style="color:#00ff88;">${d.regime_unique}</div></div>`;
  html+='</div></div>';
});
html+='</div></div>';

// ═══════════════ COMPLETED ═══════════════
html+='<div class="sec" style="border-color:#00ff88;"><h2 style="color:#00ff88;"><span class="dot" style="background:#00ff88;"></span>COMPLETED RUNS</h2>';
html+='<div class="g3">';
doneRuns.forEach(([k,nm,tg])=>{
  let d=data[k];if(!d)return;
  let p=d.loss_tok?ppl(d.loss_tok):null;
  html+=`<div class="card done"><div class="nm">${nm} <span class="tag ${tg}">${tg.toUpperCase()}</span></div><div class="row">`;
  html+=`<div class="m"><div class="k">Step</div><div class="v">${(d.step||0).toLocaleString()}</div></div>`;
  if(p&&p<1e6)html+=`<div class="m"><div class="k">PPL</div><div class="v" style="color:#00ff88;">${fmt(p)}</div></div>`;
  if(d._total_steps)html+=`<div class="m"><div class="k">Entries</div><div class="v" style="color:#444;">${d._total_steps.toLocaleString()}</div></div>`;
  html+='</div></div>';
});
html+='</div></div>';

// ═══════════════ RESEARCH STATUS ═══════════════
html+='<div class="sec status"><h2><span class="dot"></span>Research Status</h2>';
html+='<table>';
html+='<tr><td>Patent</td><td class="w">FILED</td><td>App #64/002,166 (March 10, 2026)</td></tr>';
html+='<tr><td>Paper</td><td class="w">UPDATED</td><td>12 pages with TPU results</td></tr>';
html+='<tr><td>Proof Pack</td><td class="w">V2 AUDITED</td><td>12 pages, every number file-verified</td></tr>';
html+='<tr><td>GitHub</td><td class="w">POLISHED</td><td>README, configs, eval scripts, citation</td></tr>';
html+='<tr><td>LinkedIn</td><td style="color:#ffaa00;">DRAFTED</td><td>Ready to publish</td></tr>';
html+='<tr><td>1.4B Scale Run</td><td style="color:#ffaa00;">ACTIVE</td><td>TPU v4-8 (lolm-no-ssm), Full Architecture</td></tr>';
html+='<tr><td>Republic</td><td class="w">SUBMITTED</td><td>$250K equity crowdfunding (SAFE)</td></tr>';
html+='<tr><td>Emergent Ventures</td><td class="w">SUBMITTED</td><td>Mercatus Center grant</td></tr>';
html+='<tr><td>NVIDIA Inception</td><td class="w">SUBMITTED</td><td>Startup program application</td></tr>';
html+='<tr><td>Wellfound</td><td style="color:#ffaa00;">PROFILE LIVE</td><td>AngelList startup presence</td></tr>';
html+='</table></div>';

// ═══════════════ CHAT ═══════════════
html+=`<div class="sec chat"><h2><span class="dot"></span>Talk to LOLM</h2>
<div style="color:#666;font-size:0.75em;margin-bottom:8px;">319M params, auto-updates with latest checkpoint. localhost only.</div>
<div id="chat-history"></div>
<div style="display:flex;gap:8px;">
<input id="chat-input" placeholder="Ask LOLM anything..." onkeydown="if(event.key==='Enter')sendChat()">
<button onclick="sendChat()" class="sbtn">SEND</button>
</div>
<div id="chat-status" style="color:#444;font-size:0.75em;margin-top:5px;"></div>
</div>`;

document.getElementById('content').innerHTML=html;
document.getElementById('updated').textContent='Data: '+new Date().toLocaleString();
fetch('http://localhost:8889').then(r=>r.json()).then(d=>{document.getElementById('chat-status').innerHTML='<span class="w">Connected: '+d.model+' (step '+d.step+')</span>';}).catch(()=>{document.getElementById('chat-status').innerHTML='<span class="l">Chat offline (localhost only)</span>';});

}).catch(e=>{document.getElementById('content').innerHTML='<div style="color:red;text-align:center;margin-top:100px;">Load error: '+e+'</div>';});

function sendChat(){let i=document.getElementById('chat-input'),h=document.getElementById('chat-history'),s=document.getElementById('chat-status'),p=i.value.trim();if(!p)return;h.innerHTML+='<div style="color:#00aaff;margin:4px 0;"><b>You:</b> '+p+'</div>';i.value='';s.innerHTML='<span style="color:#ffaa00;">Generating...</span>';fetch('http://localhost:8889',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({prompt:p,max_tokens:80})}).then(r=>r.json()).then(d=>{h.innerHTML+='<div style="color:#ff00ff;margin:4px 0;"><b>LOLM:</b> '+d.response.substring(p.length)+'</div>';s.innerHTML='<span class="w">Ready</span>';h.scrollTop=h.scrollHeight;}).catch(()=>{h.innerHTML+='<div class="l">Chat server not running</div>';});}
</script></body></html>
